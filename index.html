<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Michael Arundel | Terminal Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-frame">
        <nav class="top-nav" aria-label="Section navigation">
            <div class="top-tabs">
                <button type="button" class="tab-button is-active" data-command="a" data-section="about" aria-pressed="true">ABOUT</button>
                <button type="button" class="tab-button" data-command="p" data-section="projects" aria-pressed="false">PROJECTS</button>
                <button type="button" class="tab-button" data-command="e" data-section="experience" aria-pressed="false">EXPERIENCE</button>
            </div>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode">☀</button>
        </nav>

        <main class="terminal-shell" aria-label="Portfolio terminal">
            <p class="terminal-commands">commands: a/about p/projects e/experience c/clear</p>

            <section id="terminal-output" class="terminal-output" aria-live="polite"></section>

            <form id="terminal-form" class="terminal-form" autocomplete="off">
                <label class="prompt" for="terminal-input">mick-arundel@portfolio %</label>
                <input id="terminal-input" class="terminal-input" name="command" type="text" placeholder="type a command and press enter" spellcheck="false" autocomplete="off" autofocus>
            </form>
        </main>
    </div>

    <script>
        (() => {
            const outputEl = document.getElementById('terminal-output');
            const formEl = document.getElementById('terminal-form');
            const inputEl = document.getElementById('terminal-input');
            const themeToggle = document.getElementById('theme-toggle');
            const tabButtons = Array.from(document.querySelectorAll('.tab-button'));
            const promptPrefix = 'mick-arundel@portfolio %';
            const headshotPath = 'media/headshot-w.png';

            const sections = {
                about: [
                    'ABOUT',
                    {
                        name: 'Name',
                        details: 'Michael Arundel, but I go by Mick'
                    },
                    {
                        name: 'Education',
                        details: 'UofM Computer Science in Engineering'
                    },
                    {
                        name: 'Work',
                        details: 'Software Engineer in the Greater Chicago Area'
                    },
                    {
                        name: 'Personal',
                        details: 'Mediocre Golfer, lifelong basketball player'
                    },
                    {
                        name: 'Core Stack',
                        details: 'C++, Python, AWS, Docker, Postgres'
                    },
                    {
                        name: 'Email',
                        detailsHtml: '<a href="mailto:marundel@umich.edu">marundel@umich.edu</a>'
                    },
                    {
                        name: 'Profiles',
                        detailsHtml: '<a href="https://github.com/arundelm" target="_blank" rel="noopener noreferrer">GitHub</a> | <a href="https://www.linkedin.com/in/michael-arundel" target="_blank" rel="noopener noreferrer">LinkedIn</a>'
                    }
                ],
                projects: [
                    'PROJECTS',
                    {
                        name: 'Social Wagering Platform',
                        details: 'Peer-to-peer social betting experience in regulatory process',
                        url: ''
                    },
                    {
                        name: 'Refinr',
                        details: 'Severance Macrodata Refinement style game that generates high-signal RLHF preference data',
                        url: 'https://github.com/arundelm/refinr-game'
                    },
                    {
                        name: 'Trendposter',
                        details: 'AI-powered tweet scheduler that watches trending topics and posts your queued tweets',
                        url: 'https://github.com/arundelm/trendposter'
                    }
                ],
                experience: [
                    'EXPERIENCE',
                    {
                        name: 'Federal Reserve',
                        details: 'Cloud/Data Engineering work + pitched AI adoption to C-Suite Executives as final project',
                        url: ''
                    },
                    {
                        name: 'Astral',
                        details: 'Developed an AI trading assistant prototype that raised $2M in angel investment',
                        url: 'https://heyastral.ai/'
                    },
                    {
                        name: 'Eggs Finance',
                        details: 'Designed a DeFi lending widget that resulted in $44M in borrowed funds and total value locked',
                        url: 'https://eggs.finance/'
                    },
                    {
                        name: 'UMich UMTRI',
                        details: 'Analysis on wheelchair docking on autonomous vehicles adopted by an industry coalition',
                        url: 'https://wc-transportation-safety.umtri.umich.edu/udig-universal-docking-interface-geometry/'
                    }
                ]
            };

            const hiddenCommands = [
                'HIDDEN COMMANDS',
                'h/s - show hidden command list',
                't - show tech stack',
                'i - show headshot',
                'l - light mode',
                'd - dark mode'
            ];

            const techStack = [
                'TECH STACK',
                'Languages: C++, Python, TypeScript',
                'Backend: FastAPI, REST APIs, Postgres',
                'Infra: AWS, Docker',
                'Focus: AI-enabled product development'
            ];

            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const storedTheme = (() => {
                try {
                    return localStorage.getItem('theme');
                } catch {
                    return null;
                }
            })();
            const initialTheme = storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : systemTheme;

            const commandHistory = [];
            let commandHistoryIndex = -1;

            const appendLine = (text, kind = 'info', allowHtml = false) => {
                const line = document.createElement('p');
                line.className = `term-line term-${kind}`;
                if (allowHtml) {
                    line.innerHTML = text;
                } else {
                    line.textContent = text;
                }
                outputEl.appendChild(line);
                outputEl.scrollTop = outputEl.scrollHeight;
            };

            const appendImage = (src, alt) => {
                const figure = document.createElement('figure');
                figure.className = 'term-media';

                const image = document.createElement('img');
                image.className = 'term-image';
                image.src = src;
                image.alt = alt;
                image.loading = 'lazy';

                figure.appendChild(image);
                outputEl.appendChild(figure);
                outputEl.scrollTop = outputEl.scrollHeight;
            };

            const escapeHtml = (value) => String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');

            const formatEntryLine = (entry) => {
                const name = escapeHtml(entry.name || '');
                const details = entry.detailsHtml || escapeHtml(entry.details || '');
                const hasUrl = Boolean(entry.url);
                const safeUrl = hasUrl ? escapeHtml(entry.url) : '';
                const title = hasUrl
                    ? `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${name}</a>`
                    : name;

                return `<span class="term-entry-title">${title}</span><span class="term-entry-details"> - ${details}</span>`;
            };

            const appendBlock = (lines, kind = 'info') => {
                lines.forEach((line, index) => {
                    if (line && typeof line === 'object' && line.html) {
                        appendLine(line.html, line.kind || kind, true);
                        return;
                    }

                    if (line && typeof line === 'object' && line.name) {
                        appendLine(formatEntryLine(line), line.kind || kind, true);
                        return;
                    }

                    appendLine(line, index === 0 ? 'section' : kind);
                });
            };

            const setActiveTab = (sectionKey) => {
                tabButtons.forEach((button) => {
                    const active = button.dataset.section === sectionKey;
                    button.classList.toggle('is-active', active);
                    button.setAttribute('aria-pressed', String(active));
                });
            };

            const applyTheme = (theme) => {
                document.documentElement.setAttribute('data-theme', theme);
                const nextTheme = theme === 'dark' ? 'light' : 'dark';
                themeToggle.textContent = theme === 'dark' ? '☾' : '☀';
                themeToggle.setAttribute('aria-label', `Switch to ${nextTheme} mode`);
                themeToggle.setAttribute('title', `${theme.charAt(0).toUpperCase()}${theme.slice(1)} mode`);
                themeToggle.setAttribute('aria-pressed', String(theme === 'dark'));
            };

            const showSection = (sectionKey) => {
                setActiveTab(sectionKey);
                appendBlock(sections[sectionKey]);
                window.history.replaceState(null, '', `#${sectionKey}`);
            };

            const runCommand = (rawInput, options = {}) => {
                const { echo = true } = options;
                const input = (rawInput || '').trim();

                if (!input) {
                    return;
                }

                const normalized = input.toLowerCase();
                const token = normalized.split(/\s+/)[0];

                if (echo) {
                    appendLine(`${promptPrefix} ${input}`, 'command');
                }

                if (token === 'a' || token === 'about') {
                    showSection('about');
                    return;
                }

                if (token === 'p' || token === 'projects') {
                    showSection('projects');
                    return;
                }

                if (token === 'e' || token === 'experience') {
                    showSection('experience');
                    return;
                }

                if (token === 'c' || token === 'clear') {
                    outputEl.textContent = '';
                    return;
                }

                if (token === 'h' || token === 's') {
                    appendBlock(hiddenCommands, 'ok');
                    return;
                }

                if (token === 't') {
                    appendBlock(techStack, 'info');
                    return;
                }

                if (token === 'l' || token === 'd') {
                    const theme = token === 'l' ? 'light' : 'dark';
                    applyTheme(theme);
                    try {
                        localStorage.setItem('theme', theme);
                    } catch {
                        // Ignore storage failures.
                    }
                    appendLine(`Theme set to ${theme}.`, 'ok');
                    return;
                }

                if (token === 'i') {
                    appendImage(headshotPath, 'Headshot of Mick Arundel');
                    appendLine('Headshot loaded.', 'ok');
                    return;
                }

                appendLine(`msh: command not found: ${token}`, 'error');
                appendLine('Hint: try h', 'ok');
            };

            formEl.addEventListener('submit', (event) => {
                event.preventDefault();
                const value = inputEl.value;

                if (value.trim()) {
                    commandHistory.push(value.trim());
                    commandHistoryIndex = commandHistory.length;
                }

                runCommand(value);
                inputEl.value = '';
            });

            tabButtons.forEach((button) => {
                button.addEventListener('click', () => {
                    const sectionKey = button.dataset.section;
                    outputEl.textContent = '';
                    showSection(sectionKey);
                    inputEl.focus();
                });
            });

            inputEl.addEventListener('keydown', (event) => {
                if (event.key === 'ArrowUp') {
                    event.preventDefault();
                    if (commandHistory.length === 0) {
                        return;
                    }

                    commandHistoryIndex = Math.max(0, commandHistoryIndex - 1);
                    inputEl.value = commandHistory[commandHistoryIndex] || '';
                    return;
                }

                if (event.key === 'ArrowDown') {
                    event.preventDefault();
                    if (commandHistory.length === 0) {
                        return;
                    }

                    commandHistoryIndex = Math.min(commandHistory.length, commandHistoryIndex + 1);
                    inputEl.value = commandHistory[commandHistoryIndex] || '';
                }
            });

            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
                try {
                    localStorage.setItem('theme', nextTheme);
                } catch {
                    // Ignore storage failures.
                }
            });

            applyTheme(initialTheme);
            appendLine('Portfolio terminal ready.', 'ok');
            appendLine('Tip: not all commands are listed.', 'ok');

            const initialHash = (window.location.hash || '').replace('#', '').toLowerCase();
            if (initialHash && sections[initialHash]) {
                showSection(initialHash);
            } else {
                showSection('about');
            }

            inputEl.focus();
        })();
    </script>
</body>
</html>
